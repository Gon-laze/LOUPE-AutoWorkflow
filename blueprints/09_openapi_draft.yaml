openapi: 3.1.0
info:
  title: AutoWorkFlow API Draft
  version: 0.2.1
  description: >
    Contract-first API draft for remote submission, workflow execution, report retrieval,
    retry, and provider introspection.
servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Local

security:
  - bearerAuth: []

tags:
  - name: Health
  - name: Jobs
  - name: Reports
  - name: Dashboard
  - name: Providers

paths:
  /v1/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  timestamp:
                    type: string
                required: [status, timestamp]

  /v1/jobs:
    post:
      tags: [Jobs]
      summary: Submit a paper analysis job
      operationId: createJob
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                paper_file:
                  type: string
                  format: binary
                user_profile:
                  type: string
                  description: JSON string for profile config
                provider_policy:
                  type: string
                  description: JSON string for provider routing policy
              required: [paper_file]
      responses:
        "202":
          description: accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get job status
      operationId: getJobStatus
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: current job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/jobs/{job_id}/retry:
    post:
      tags: [Jobs]
      summary: Retry a failed or degraded job
      operationId: retryJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                from_stage:
                  type: string
                override_provider_policy:
                  type: object
      responses:
        "202":
          description: retry accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/jobs/{job_id}/reports/{report_type}:
    get:
      tags: [Reports]
      summary: Get generated report by type
      operationId: getReport
      parameters:
        - $ref: "#/components/parameters/JobId"
        - name: report_type
          in: path
          required: true
          schema:
            type: string
            enum:
              - artifact_json
              - paper_value_json
              - ddi_json
              - dashboard_json
              - artifact_md
              - paper_value_md
      responses:
        "200":
          description: report content
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ArtifactReportEnvelope"
                  - $ref: "#/components/schemas/PaperValueReportEnvelope"
                  - $ref: "#/components/schemas/DDIReportEnvelope"
                  - $ref: "#/components/schemas/DashboardPayloadEnvelope"
            text/markdown:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/jobs/{job_id}/ddi:
    get:
      tags: [Reports]
      summary: Get DDI report for a job
      operationId: getDDIReport
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: DDI report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DDIReportEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/jobs/{job_id}/dashboard:
    get:
      tags: [Dashboard]
      summary: Get dashboard payload for a job
      operationId: getDashboardPayload
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: dashboard payload JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardPayloadEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/jobs/{job_id}/trace:
    get:
      tags: [Jobs]
      summary: Get workflow trace summary
      operationId: getJobTrace
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: trace metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  stages:
                    type: array
                    items:
                      type: object
                      properties:
                        stage_id: {type: string}
                        status: {type: string}
                        started_at: {type: string}
                        finished_at: {type: string}
                  provider_usage:
                    type: array
                    items:
                      type: object
                      properties:
                        provider: {type: string}
                        model: {type: string}
                        token_in: {type: integer}
                        token_out: {type: integer}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/providers:
    get:
      tags: [Providers]
      summary: List available providers and models
      operationId: listProviders
      responses:
        "200":
          description: providers and capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderList"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    JobAccepted:
      type: object
      properties:
        job_id: {type: string}
        status: {type: string, enum: [queued]}
        accepted_at: {type: string}
      required: [job_id, status, accepted_at]

    JobStatus:
      type: object
      properties:
        job_id: {type: string}
        status:
          type: string
          enum: [queued, running, succeeded, failed, retrying, degraded]
        current_stage: {type: string}
        progress:
          type: number
          minimum: 0
          maximum: 1
        created_at: {type: string}
        updated_at: {type: string}
        downloadable_reports:
          type: array
          items: {type: string}
        alignment_metrics:
          type: object
          description: Methodology-alignment diagnostics from mandatory gates.
          properties:
            evidence_coverage_ratio: {type: number, minimum: 0, maximum: 1}
            schema_violation_rate: {type: number, minimum: 0, maximum: 1}
            magic_byte_mismatch_ratio: {type: number, minimum: 0, maximum: 1}
            freshness_signal_coverage: {type: number, minimum: 0, maximum: 1}
      required: [job_id, status, created_at, updated_at]

    ArtifactReportEnvelope:
      type: object
      properties:
        report_type: {type: string, enum: [artifact_json]}
        payload:
          type: object
          description: Must conform to schemas/artifact_report.schema.json
      required: [report_type, payload]

    PaperValueReportEnvelope:
      type: object
      properties:
        report_type: {type: string, enum: [paper_value_json]}
        payload:
          type: object
          description: Must conform to schemas/paper_value_report.schema.json
      required: [report_type, payload]

    DDIReportEnvelope:
      type: object
      properties:
        report_type: {type: string, enum: [ddi_json]}
        payload:
          type: object
          description: Must conform to schemas/ddi_report.schema.json
      required: [report_type, payload]

    DashboardPayloadEnvelope:
      type: object
      properties:
        report_type: {type: string, enum: [dashboard_json]}
        payload:
          type: object
          description: Must conform to schemas/dashboard_payload.schema.json
      required: [report_type, payload]

    ProviderList:
      type: object
      properties:
        providers:
          type: array
          items:
            type: object
            properties:
              provider: {type: string}
              models:
                type: array
                items:
                  type: object
                  properties:
                    model: {type: string}
                    structured_output: {type: boolean}
                    tool_calling: {type: boolean}
                    max_context_tokens: {type: integer}
      required: [providers]

    ErrorResponse:
      type: object
      properties:
        code: {type: string}
        message: {type: string}
        trace_id: {type: string}
      required: [code, message]
